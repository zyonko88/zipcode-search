<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>郵便番号検索</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 16px 60px;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .hero {
    text-align: center;
    margin-bottom: 32px;
  }

  .hero-icon {
    font-size: 3rem;
    margin-bottom: 12px;
    display: block;
  }

  .hero h1 {
    font-size: 1.6rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .hero p {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.75);
  }

  /* 検索カード */
  .search-card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    margin-bottom: 20px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .input-wrap input {
    width: 100%;
    padding: 16px 54px 16px 20px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 1.3rem;
    font-family: inherit;
    letter-spacing: 4px;
    text-align: center;
    outline: none;
    color: #2d3748;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #f7f8fa;
  }

  .input-wrap input:focus {
    border-color: #667eea;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
  }

  .input-wrap input::placeholder {
    color: #c0c0c0;
    letter-spacing: 2px;
    font-size: 1.1rem;
  }

  .clear-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: #e2e8f0;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 0.85rem;
    cursor: pointer;
    color: #718096;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .clear-btn:hover { background: #cbd5e0; }
  .clear-btn.show  { display: flex; }

  .search-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .search-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* 結果カード */
  .result-card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .result-card.show { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-zip {
    font-size: 0.82rem;
    font-weight: 700;
    color: #a0aec0;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-align: center;
  }

  .result-address {
    text-align: center;
    margin-bottom: 20px;
  }

  .addr-pref {
    font-size: 1.1rem;
    color: #667eea;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .addr-city {
    font-size: 1.8rem;
    font-weight: 900;
    color: #2d3748;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .addr-town {
    font-size: 1.2rem;
    color: #4a5568;
    font-weight: 600;
  }

  .copy-btn {
    width: 100%;
    padding: 12px;
    background: #f7f8fa;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    color: #4a5568;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }

  .copy-btn:hover { background: #edf2f7; border-color: #667eea; color: #667eea; }
  .copy-btn.copied { background: #f0fff4; border-color: #48bb78; color: #38a169; }

  /* エラー */
  .error-card {
    background: #fff5f5;
    border: 2px solid #feb2b2;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .error-card.show { display: block; }
  .error-icon { font-size: 2rem; margin-bottom: 8px; }
  .error-text { color: #c53030; font-weight: 700; font-size: 0.95rem; }

  /* ローディング */
  .spinner {
    display: none;
    justify-content: center;
    padding: 20px 0;
  }

  .spinner.show { display: flex; }

  .spinner-ring {
    width: 36px;
    height: 36px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hint {
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 0.8rem;
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <span class="hero-icon">📮</span>
    <h1>郵便番号検索</h1>
    <p>7桁の郵便番号から住所を瞬時に表示</p>
  </div>

  <div class="search-card">
    <div class="input-wrap">
      <input type="tel" id="zipInput" placeholder="000-0000" maxlength="8" inputmode="numeric" />
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
    <button class="search-btn" id="searchBtn">🔍 住所を検索</button>
  </div>

  <div class="spinner" id="spinner">
    <div class="spinner-ring"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-zip" id="resultZip"></div>
    <div class="result-address">
      <div class="addr-pref" id="addrPref"></div>
      <div class="addr-city" id="addrCity"></div>
      <div class="addr-town" id="addrTown"></div>
    </div>
    <button class="copy-btn" id="copyBtn">📋 住所をコピー</button>
  </div>

  <div class="error-card" id="errorCard">
    <div class="error-icon">🔍</div>
    <div class="error-text" id="errorText"></div>
  </div>

  <p class="hint">ハイフンあり・なし、どちらでも検索できます</p>
</div>

<script>
  const zipInput  = document.getElementById('zipInput');
  const clearBtn  = document.getElementById('clearBtn');
  const searchBtn = document.getElementById('searchBtn');
  const spinner   = document.getElementById('spinner');
  const resultCard= document.getElementById('resultCard');
  const errorCard = document.getElementById('errorCard');
  const copyBtn   = document.getElementById('copyBtn');

  let lastAddress = '';

  // 入力フォーマット（自動ハイフン挿入）
  zipInput.addEventListener('input', () => {
    let v = zipInput.value.replace(/[^\d]/g, '');
    if (v.length > 7) v = v.slice(0, 7);
    zipInput.value = v.length > 3 ? v.slice(0,3) + '-' + v.slice(3) : v;
    clearBtn.classList.toggle('show', zipInput.value.length > 0);
    hide();
  });

  // Enterキーで検索
  zipInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  clearBtn.addEventListener('click', () => {
    zipInput.value = '';
    clearBtn.classList.remove('show');
    hide();
    zipInput.focus();
  });

  searchBtn.addEventListener('click', search);

  async function search() {
    const raw = zipInput.value.replace(/-/g, '');
    if (raw.length !== 7) {
      showError('7桁の郵便番号を入力してください');
      return;
    }

    hide();
    spinner.classList.add('show');
    searchBtn.disabled = true;

    try {
      const res  = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${raw}`);
      const json = await res.json();

      if (json.status !== 200 || !json.results) {
        showError('該当する住所が見つかりませんでした');
        return;
      }

      const r = json.results[0];
      const pref = r.address1;
      const city = r.address2;
      const town = r.address3;

      document.getElementById('resultZip').textContent = `〒 ${raw.slice(0,3)}-${raw.slice(3)}`;
      document.getElementById('addrPref').textContent  = pref;
      document.getElementById('addrCity').textContent  = city;
      document.getElementById('addrTown').textContent  = town;

      lastAddress = pref + city + town;
      copyBtn.textContent = '📋 住所をコピー';
      copyBtn.classList.remove('copied');

      resultCard.classList.add('show');

    } catch {
      showError('通信エラーが発生しました。しばらくしてお試しください。');
    } finally {
      spinner.classList.remove('show');
      searchBtn.disabled = false;
    }
  }

  // コピー
  copyBtn.addEventListener('click', async () => {
    if (!lastAddress) return;
    try {
      await navigator.clipboard.writeText(lastAddress);
      copyBtn.textContent = '✅ コピーしました！';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '📋 住所をコピー';
        copyBtn.classList.remove('copied');
      }, 2000);
    } catch {
      copyBtn.textContent = '⚠️ コピーできませんでした';
    }
  });

  function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    errorCard.classList.add('show');
  }

  function hide() {
    resultCard.classList.remove('show');
    errorCard.classList.remove('show');
  }
</script>
</body>
</html>
